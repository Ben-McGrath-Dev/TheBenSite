    <body>
        <!--You should change your password! motto is insecure Mrs. Connor! - Mr Friggon. -->
        <h1>Enter password to access USDAA Systems.</h1>    

        <input id="passwordInput" type="password" placeholder="Enter your password here." size="23">
        <button onclick="unlock()">Unlock</button>

        <p id="message"></p>

        <script>
            async function getKey(password, salt) {
                const encoder = new TextEncoder();

                const keyMaterial = await crypto.subtle.importKey(
                    "raw",
                    encoder.encode(password),
                    "PBKDF2",
                    false,
                    ["deriveKey"]
                );

                return crypto.subtle.deriveKey(
                    {
                        name: "PBKDF2",
                        salt: salt,
                        iterations: 200000,
                        hash: "SHA-256"
                    },
                    keyMaterial,
                    {
                        name: "AES-GCM",
                        length: 256
                    },
                    false,
                    ["decrypt"]
                );
            }

            function fromBase64(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);

                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }

                return bytes;
            }

            async function unlock() {
                const message = document.getElementById("message");
                const password = document.getElementById("passwordInput").value;

                try {
                    const response = await fetch("hidden.enc");

                    if (!response.ok) {
                        throw new Error("Could not load encrypted file.");
                    }

                    const encryptedData = await response.json();

                    const salt = fromBase64(encryptedData.salt);
                    const iv = fromBase64(encryptedData.iv);
                    const content = fromBase64(encryptedData.content);

                    const key = await getKey(password, salt);

                    const decrypted = await crypto.subtle.decrypt(
                        {
                            name: "AES-GCM",
                            iv: iv
                        },
                        key,
                        content
                    );

                    const decoder = new TextDecoder();
                    const html = decoder.decode(decrypted);

                    document.open();
                    document.write(html);
                    document.close();

                } catch (error) {
                    message.textContent = "ACCESS DENIED";
                }
            }
            document.getElementById("passwordInput").addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    unlock();
                }
            });
        </script>
    </body>
</html>
